<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Интерактивная Перелистывающаяся Карточка</title> 
        
        <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="source/styles/page1styles.css"> 
    </head>
    <body>
        <section>
            <!-- Добавлен id="flipCard" и поправлен путь data-sound -->
            <div id="flipCard" data-sound="source/images/button-digital-whistling-close.mp3" class="loud-link-hover">
                <div class="container">
                    <div class="card front-face">
                        <header>
                            <span class="logo">
                                <h5>Logo Text</h5> 
                            </span>
                        </header>
                        <div class="card-details">
                            <div class="name-number">
                                <h6>Card Type</h6> 
                                <h5 class="number">1234 5678 9012 3456</h5>
                                <h5 class="name">JUST OPEN</h5>
                            </div>
                            <div class="valid-date">
                                <h6>Valid Thru</h6> 
                                <h5>12/25</h5>
                            </div>
                        </div>
                    </div>
                    <div class="card back-face">
                        <h6>Back Card Header</h6> 
                        <h5>Не важно, как медленно ты идешь, главное – не останавливаться.</h5>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Скрипт всегда лучше размещать перед закрывающим тегом </body> -->
        <script src="source/scripts/main.js"></script> 
    </body>
    </html>
